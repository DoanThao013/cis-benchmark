---
# ══════════════════════════════════════════════════════════════════════
# CIS 1.2 – API Server Remediation
# File: roles/master/tasks/1_2_api_server.yml
# Cover: 1.2.1 – 1.2.30 (30 muc)
# ══════════════════════════════════════════════════════════════════════


# ── Chuẩn bị thư mục/file phụ trợ ───────────────────────────────────
- name: "1.2 PREP – Tạo thư mục audit log"
 file:
   path: "{{ audit_log_dir }}"
   state: directory
   owner: root
   group: root
   mode: '0700'


- name: "1.2 PREP – Tạo thư mục admission config"
 file:
   path: "{{ admission_dir }}"
   state: directory
   mode: '0755'


- name: "1.2 PREP – Tạo thư mục encryption config"
 file:
   path: "{{ enc_dir }}"
   state: directory
   mode: '0700'


- name: "1.2 PREP – Tạo EventRateLimit admission config"
 copy:
   dest: "{{ admission_dir }}/event-rate-limit.yaml"
   content: |
     apiVersion: apiserver.config.k8s.io/v1
     kind: AdmissionConfiguration
     plugins:
     - name: EventRateLimit
       configuration:
         apiVersion: eventratelimit.admission.k8s.io/v1alpha1
         kind: Configuration
         limits:
         - type: Server
           qps: 5000
           burst: 20000
   mode: '0644'


- name: "1.2 PREP – Tạo audit policy file"
 copy:
   dest: /etc/kubernetes/audit-policy.yaml
   content: |
     apiVersion: audit.k8s.io/v1
     kind: Policy
     rules:
       - level: Metadata
   mode: '0644'


- name: "1.2 PREP – Check encryption config đã tồn tại chưa"
 stat:
   path: "{{ enc_dir }}/encryption-config.yaml"
 register: enc_file


- name: "1.2 PREP – Tạo encryption key ngẫu nhiên"
 shell: head -c 32 /dev/urandom | base64
 register: enc_key
 when: not enc_file.stat.exists


- name: "1.2 PREP – Tạo encryption config"
 copy:
   dest: "{{ enc_dir }}/encryption-config.yaml"
   content: |
     apiVersion: apiserver.config.k8s.io/v1
     kind: EncryptionConfiguration
     resources:
       - resources:
           - secrets
         providers:
           - aescbc:
               keys:
                 - name: key1
                   secret: "{{ enc_key.stdout }}"
           - identity: {}
   mode: '0600'
 when: not enc_file.stat.exists


# ══════════════════════════════════════════════════════════════════════
# 1.2.1 – --anonymous-auth=false
# ══════════════════════════════════════════════════════════════════════
- name: "CIS 1.2.1 – --anonymous-auth=false"
 lineinfile:
   path: "{{ apiserver_manifest }}"
   regexp: '^\s*-\s*--anonymous-auth='
   line: '    - --anonymous-auth=false'
   insertafter: '^\s*- kube-apiserver'
   backup: yes


# ══════════════════════════════════════════════════════════════════════
# 1.2.2 – --token-auth-file không được đặt
# ══════════════════════════════════════════════════════════════════════
- name: "CIS 1.2.2 – Xóa --token-auth-file nếu tồn tại"
 lineinfile:
   path: "{{ apiserver_manifest }}"
   regexp: '^\s*-\s*--token-auth-file='
   state: absent


# ══════════════════════════════════════════════════════════════════════
# 1.2.3 – DenyServiceExternalIPs
# 1.2.9 – EventRateLimit
# 1.2.11 – AlwaysPullImages
# 1.2.14 – NodeRestriction
# (Gộp chung vì cùng flag --enable-admission-plugins)
# ══════════════════════════════════════════════════════════════════════
- name: "CIS 1.2.3/9/11/14 – --enable-admission-plugins"
 lineinfile:
   path: "{{ apiserver_manifest }}"
   regexp: '^\s*-\s*--enable-admission-plugins='
   line: '    - --enable-admission-plugins=NodeRestriction,EventRateLimit,DenyServiceExternalIPs,AlwaysPullImages'
   insertafter: '^\s*- kube-apiserver'


