# ══════════════════════════════════════════════════════════════════════
# 1.2.10 – AlwaysAdmit không được bật (xóa nếu có)
# ══════════════════════════════════════════════════════════════════════
- name: "CIS 1.2.10 – Xóa AlwaysAdmit khỏi enable-admission-plugins nếu có"
 shell: |
   grep -q 'AlwaysAdmit' {{ apiserver_manifest }} && \
   sed -i 's/,AlwaysAdmit//g; s/AlwaysAdmit,//g; s/AlwaysAdmit//g' {{ apiserver_manifest }} || true
 changed_when: false


